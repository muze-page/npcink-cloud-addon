name: CI

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

concurrency:
  group: cloud-addon-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php-contracts:
    name: PHP contracts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Validate Composer metadata
        run: composer validate --no-check-publish

      - name: PHP lint
        run: composer run lint:php

      - name: Contract tests
        run: composer run test:contracts

      - name: Run WordPress.org review guard
        run: composer run check:wporg

      - name: Boundary search
        run: |
          ! grep -RInE '/v1/runtime/workflows/runs|wp_insert_post|wp_update_post' \
            --include='*.php' \
            --exclude-dir='.git' \
            --exclude-dir='build' \
            --exclude-dir='vendor' \
            .
